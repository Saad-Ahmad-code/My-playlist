<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 My Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Music Player</h1>
            <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search songs or artists...">
        </div>

        <!-- Audio Player -->
        <audio id="player" controls></audio>

        <!-- Now Playing Card with Album Art -->
        <div id="now-playing-card" class="now-playing-card" style="display: none;">
            <div class="album-art-container">
                <img id="album-art" src="" alt="Album Art" class="album-art">
                <div class="playing-indicator">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
            <div class="now-playing-info">
                <div class="now-playing-title" id="now-playing-title">Now Playing</div>
                <div class="now-playing-artist" id="now-playing-artist">Unknown Artist</div>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="controls">
            <button onclick="prevSong()">⏮ Previous</button>
            <button onclick="togglePlayPause()" id="play-pause-btn">▶ Play</button>
            <button onclick="nextSong()">⏭ Next</button>
            <button onclick="shuffleSong()">🔀 Shuffle</button>
            <button onclick="toggleRepeat()" id="repeat-btn">🔁 Repeat</button>
        </div>

            <!-- Keyboard Shortcuts Info -->
            <div class="keyboard-shortcuts">
                <small>💡 Tip: Space = Play/Pause | ← → = Skip Songs | M = Mute</small>
            </div>

        <!-- Progress Bar -->
        <div class="progress-control">
            <label for="progress">⏩ Progress</label>
            <input type="range" id="progress" min="0" max="100" value="0">
            <div id="time-display">00:00 / 00:00</div>
        </div>

        <!-- Volume Control -->
        <div class="volume-control">
            <label for="volume">🔊 Volume</label>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
        </div>

        <!-- Playlist -->
        <h2>Playlist</h2>
        <div class="playlist" id="playlist"></div>

        <!-- Queue Section -->
        <h2>⏳ Queue (Next 5 Songs)</h2>
        <div class="queue-section">
            <div class="queue" id="queue"></div>
        </div>

        <!-- Recently Played -->
        <h2>🕐 Recently Played</h2>
        <div class="recently-played" id="recently-played"></div>

        <!-- Favorites Section -->
        <h2>⭐ Favorites</h2>
        <div class="favorites" id="favorites"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
